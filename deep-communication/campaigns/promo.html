<!-- promo.html — optional app download + social links block -->
<!-- Include between body and footer.html when you want to promote the app -->
<!--
  Localized template variables (set at send time based on lang):

-->
<div style="margin:0;padding:0;background-color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:0 24px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0">
          <!-- Divider -->
          <tr>
            <td style="border-top:1px solid #f3f4f6;font-size:0;line-height:0;padding-top:32px;" height="1">&nbsp;</td>
          </tr>

          <!-- App download CTAs -->
          <tr>
            <td align="center" style="padding:16px 0 8px;">
              <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;color:#374151;">
                Get the Step app
              </span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:0 6px;">
                    <a href="https://apps.apple.com/app/step-language-curriculums/id6758322906" target="_blank" style="text-decoration:none;">
                      <img src="https://step.is/assets/appstore.png" alt="Download on the App Store" height="40" style="display:block;border:0;outline:none;" />
                    </a>
                  </td>
                  <td style="padding:0 6px;">
                    <a href="https://play.google.com/store/apps/details?id=app.step" target="_blank" style="text-decoration:none;">
                      <img src="https://step.is/assets/playstore.png" alt="Get it on Google Play" height="40" style="display:block;border:0;outline:none;" />
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="https://releases.nspace.is/Step.dmg" target="_blank" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;color:#3b82f6;text-decoration:none;">
                Download for macOS
              </a>
            </td>
          </tr>

          <!-- Social links -->
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:0 8px;">
                    <a href="{{website_url}}" target="_blank" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;color:#6b7280;text-decoration:none;">
                      Website
                    </a>
                  </td>
                  <td style="color:#d1d5db;font-size:13px;">·</td>
                  <td style="padding:0 8px;">
                    <a href="https://facebook.com/step.language.learning" target="_blank" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;color:#6b7280;text-decoration:none;">
                      Facebook
                    </a>
                  </td>
                  {{zalo_link}}
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
