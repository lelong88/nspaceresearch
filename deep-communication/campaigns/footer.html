<!-- footer.html — shared email footer, always included -->
<!--
  Template variables:
    {{unsubscribe_url}} — per-recipient unsubscribe link
    {{view_url}}        — public R2 link to this email (https://emails.step.is/...)
-->
<div style="margin:0;padding:0;background-color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:40px 24px 40px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0">
          <!-- Divider -->
          <tr>
            <td style="border-top:1px solid #f3f4f6;font-size:0;line-height:0;" height="1">&nbsp;</td>
          </tr>

          <!-- Unsubscribe + View in browser -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <a href="{{unsubscribe_url}}" target="_blank" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#9ca3af;text-decoration:underline;">
                Unsubscribe
              </a>
              <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#d1d5db;"> · </span>
              <a href="{{view_url}}" target="_blank" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#9ca3af;text-decoration:underline;">
                View in browser
              </a>
            </td>
          </tr>

          <!-- Legal -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:11px;color:#d1d5db;line-height:1.5;">
                © 2026 NSPACE TECHNOLOGY PTE. LTD.
              </span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
