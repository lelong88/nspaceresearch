<!doctype html>
<html lang="vi">
<head>

  <style>
    :root{ --text:#0f172a; --muted:#64748b; --card:#fff; --line:#e5e7eb; --brand:#0a8a5b; --shadow:0 6px 18px rgba(2,6,23,.08); }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--text); background:#f8fafc}
    header{position:sticky; top:0; z-index:10; background:rgba(255,255,255,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line)}
    .wrap{width:min(1200px, 100% - 28px); margin-inline:auto}
    .nav{display:flex; align-items:center; justify-content:space-between; padding:10px 0}
    h1{font-size:clamp(20px, 2.8vw, 28px); margin:0}
    .muted{color:var(--muted)}
    .btn{display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; border:1px solid var(--line); background:#fff; color:#0f172a; text-decoration:none}
    .btn.primary{background:var(--brand); color:#fff; border-color:transparent}
    .btns{display:flex; gap:10px; flex-wrap:wrap}
    .card{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow)}
    .panel{padding:14px}
    .iframe-wrap{height: calc(100vh - 170px); min-height:560px; border-top:1px solid var(--line)}
    iframe{width:100%; height:100%; border:0; border-bottom-left-radius:12px; border-bottom-right-radius:12px}
    .meta{font-size:13px; color:var(--muted)}
    .tag{display:inline-block; padding:2px 8px; border-radius:999px; background:#ecfdf5; color:#065f46; border:1px solid #bbf7d0; font-size:12px}
  </style>
</head>
<body>
  <header>

      </div>
      <div class="btns">

  <script>

    const params = new URLSearchParams(window.location.search);
    const pick = params.get('pick') || '';
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');

    if (pick) {
      titleEl.textContent = `Tích chuyên sâu · ${pick}`;
      subtitleEl.textContent = 'Dưới đây là “Tài liệu minh họa bán hàng” do Manulife phát hành.';

    }

</body>
