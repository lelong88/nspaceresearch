services:
  web:
    build: .
    ports:
      - "6006:6006"
    env_file:
      - .env
    volumes:
      - ./meeting-audios:/app/meeting-audios
      - ./slides:/app/slides
      - ./output:/app/output
      - ./summary-mac.md:/app/summary-mac.md:ro
      - ./glossary.md:/app/glossary.md:ro
    restart: unless-stopped
